<!DOCTYPE html>
<html xlmns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Inicio</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
	<div class="container text-center">
		<h1>Bienvenido</h1>

		<div sec:authorize="isAnonymous()" class="user-menu">
			<a th:href="@{/login}" class="nav-link nav-icon btn-login" id="login-button">
				<i class="bi bi-box-arrow-in-right material-icons"></i><span class="nav-text">Inicia
					Sesión</span>
			</a>
		</div>

		<div sec:authorize="isAuthenticated()">
			<div th:if="${#authentication.authenticated}">
				<h1>Bienvenido <span th:text="${#authentication.name}"></span></h1>
			</div>

			<a th:href="@{/logout}">
				<span class="material-icons"><i class="bi bi-box-arrow-in-left"></i>Cerrar
					Sesión</span>
			</a>
		</div>
	</div>
</body>

</html>
